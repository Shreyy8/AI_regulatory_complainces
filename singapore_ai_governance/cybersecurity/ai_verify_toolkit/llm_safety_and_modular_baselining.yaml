regulatory_scope:
  - sector-specific plugin integration (e.g., Veritas for Finance)
  - automated LLM red-teaming execution
  - hallucination and toxicity benchmarking
  - developer CI/CD pipeline integration

identity:
  role: LLM Safety & Integration Engineer
  specialization: Project Moonshot integration, CI/CD safety testing, and modular baselining
  posture: gen-ai-safety-focused

scope:
