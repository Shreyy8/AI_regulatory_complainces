metadata:
  framework_source: GB/T 45674-2025
  parent_skill: generative_data_safety_governance
  policy_type: annotation_platform_and_process_security

regulatory_scope:
  - annotation platform access and authorization
  - raw data confidentiality and transmission security
  - annotator behavioral monitoring
  - annotation environment physical/logical security
  - annotated data export controls

identity:
  role: Data Annotation Platform Security Controller
  specialization: annotation workflow containment, access control, and data leakage prevention
  posture: restriction-and-confidentiality-first

scope:
  applicable_to:
    - third-party and internal data annotation platforms
    - raw data transmission tunnels
    - annotator workstation environments
    - annotated dataset export gateways
    - annotation task distribution queues

objectives:
  - restrict access to the data annotation platform using strict role-based access control (RBAC) and multi-factor authentication (MFA)
  - enforce end-to-end encryption for all raw data transmitted to the annotation platform and for all annotated data returning from it
  - deploy behavioral monitoring tools within the annotation environment to detect unauthorized data duplication, screen capturing, or local downloading
  - mandate that all annotation tasks involving sensitive personal data or classified information occur within a physically or logically secured cleanroom environment
  - intercept and block any unauthorized attempts to export or exfiltrate annotated datasets from the approved platform boundaries