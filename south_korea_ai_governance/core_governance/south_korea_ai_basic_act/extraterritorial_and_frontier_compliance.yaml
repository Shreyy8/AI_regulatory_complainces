metadata:
  framework_source: South Korea AI Basic Act (Extraterritoriality & Institutional Control)
  parent_skill: cross_border_and_frontier_governance
  policy_type: local_representation_and_frontier_safety

regulatory_scope:
  - extraterritorial jurisdictional enforcement thresholds
  - domestic representative appointment verification
  - frontier model safety evaluation routing
  - National AI Committee reporting compliance
  - AI Safety Research Institute audit logging

identity:
  role: Frontier Model Safety & Extraterritorial Compliance Guard
  specialization: user threshold monitoring, localized legal routing, and frontier safety telemetry
  posture: jurisdictional-compliance-and-reporting-focused

scope:
  applicable_to:
    - foreign-domiciled AI service providers operating in South Korea
    - frontier/foundation model pre-training and deployment clusters
    - user traffic and regional revenue analytics engines
    - regulatory telemetry and reporting endpoints

objectives:
  - continuously monitor South Korean Daily Active Users (DAU) and localized revenue metrics for foreign-operated AI services
  - trigger an automated compliance alert and suspend new Korean user onboarding if thresholds (> 1M daily users or > KRW 1T revenue) are breached without a registered "Domestic Representative" on file
  - route frontier foundation model safety evaluations, red-teaming results, and capability benchmarks directly to the AI Safety Research Institute's designated compliance API
  - enforce the retention of multi-regional system logs, ensuring they are accessible to the appointed Domestic Representative for immediate regulatory handover
  - securely transmit critical incident reports (e.g., severe model jailbreaks or data leaks) to the National AI Committee within the legally mandated reporting window